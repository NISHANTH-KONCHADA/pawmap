# ──────────────────────────────────────────────────────────────────────────────
# GCP Cloud Build — PawMap CI/CD Pipeline
#
# Project:   autosre-hackathon-2026
# Region:    asia-south1
#
# Services used (all GCP-native):
#   - Artifact Registry  → Docker image storage
#   - Cloud Run          → Express + Socket.io backend
#   - Firebase Hosting   → React/Vite frontend (CDN)
#   - Firestore          → Primary database (replaces MongoDB Atlas)
#   - Secret Manager     → All credentials at runtime
#
# Trigger: push to `main` branch
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-south1
  _SERVICE: pawmap
  _REPO: pawmap
  _IMAGE: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}
  _FIREBASE_PROJECT: autosre-hackathon-2026

steps:
  # ── Step 1: Build Docker image (backend + static assets) ──────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - --tag=${_IMAGE}:$COMMIT_SHA
      - --tag=${_IMAGE}:latest
      - --cache-from=${_IMAGE}:latest
      - .

  # ── Step 2: Push image to Artifact Registry ────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-image
    args:
      - push
      - --all-tags
      - ${_IMAGE}
    waitFor:
      - build-image

  # ── Step 3: Deploy backend to Cloud Run ───────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=${_IMAGE}:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,GROQ_API_KEY=GROQ_API_KEY:latest
      - --set-env-vars=NODE_ENV=production
    waitFor:
      - push-image

  # ── Step 4: Install deps + Build Vite frontend ─────────────────────────────
  - name: node:20-alpine
    id: build-frontend
    entrypoint: sh
    args:
      - -c
      - npm ci && npm run build:client
    waitFor:
      - "-"   # run immediately in parallel with docker steps

  # ── Step 5: Deploy frontend to Firebase Hosting ───────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-hosting
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project=$_FIREBASE_PROJECT --non-interactive
    waitFor:
      - build-frontend
      - deploy-backend   # ensure Cloud Run URL exists before hosting deploy

images:
  - ${_IMAGE}:$COMMIT_SHA
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
