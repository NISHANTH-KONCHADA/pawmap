# ──────────────────────────────────────────────────────────────────────────────
# GCP Cloud Build — PawMap CI/CD Pipeline
#
# Trigger: push to `main` branch (configure in GCP Cloud Build console)
#
# Prerequisites (configure via GCP Console or gcloud CLI):
#   1. Enable APIs: cloudbuild.googleapis.com, run.googleapis.com, artifactregistry.googleapis.com
#   2. Create an Artifact Registry repository named "pawmap" in your preferred region
#   3. Store secrets in GCP Secret Manager and grant Cloud Build SA access:
#        - MONGODB_URI
#        - JWT_SECRET
#        - CLOUDINARY_URL / CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET
#        - GROQ_API_KEY
#        - CLIENT_URL
#   4. Set substitution variables below or pass them via trigger configuration
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-south1          # Change to your preferred GCP region
  _SERVICE: pawmap              # Cloud Run service name
  _REPO: pawmap                 # Artifact Registry repository name
  _IMAGE: $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE

steps:
  # ── Step 1: Build the Docker image ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - --tag=$_IMAGE:$COMMIT_SHA
      - --tag=$_IMAGE:latest
      - --cache-from=$_IMAGE:latest
      - .

  # ── Step 2: Push image to Artifact Registry ─────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-image
    args:
      - push
      - --all-tags
      - $_IMAGE
    waitFor:
      - build-image

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_IMAGE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,GROQ_API_KEY=GROQ_API_KEY:latest,CLOUDINARY_URL=CLOUDINARY_URL:latest,CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest,CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest,CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest,CLIENT_URL=CLIENT_URL:latest
      - --set-env-vars=NODE_ENV=production
    waitFor:
      - push-image

images:
  - $_IMAGE:$COMMIT_SHA
  - $_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
